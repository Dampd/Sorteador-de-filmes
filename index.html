<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineSorteio | Premium 🎬</title>
    <style>
        :root {
            --primary: #e50914;
            --glass: rgba(20, 20, 20, 0.75);
            --border: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            /* Imagem de fundo com grid de filmes de alta qualidade */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=2059&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        /* Efeito de Vidro (Glassmorphism) */
        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 450px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(229, 9, 20, 0.4);
        }

        p { color: #ccc; margin-bottom: 20px; font-size: 0.9rem; }

        textarea {
            width: 100%;
            height: 120px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            color: white;
            resize: none;
            margin-bottom: 20px;
            font-size: 1rem;
            transition: 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-main {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.3);
        }

        .btn-main:hover {
            transform: translateY(-3px);
            background: #ff0a16;
            box-shadow: 0 8px 25px rgba(229, 9, 20, 0.5);
        }

        .btn-clear {
            background: transparent;
            color: #888;
            border: none;
            margin-top: 15px;
            cursor: pointer;
            font-size: 0.8rem;
            text-decoration: underline;
        }

        #resultado {
            margin-top: 30px;
            min-height: 60px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #f1c40f;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pop-animation {
            animation: pop 0.4s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>CineSorteio</h1>
        <p>Sua próxima maratona começa aqui 🍿</p>
        
        <textarea id="listaFilmes" placeholder="Insira os nomes dos filmes aqui&#10;Um por linha..."></textarea>
        
        <button class="btn-main" onclick="sortear()">🎲 SORTEAR AGORA</button>
        <button class="btn-clear" onclick="limpar()">Limpar lista</button>

        <div id="resultado">Dê o play!</div>
    </div>

    <script>
        const textarea = document.getElementById('listaFilmes');
        const display = document.getElementById('resultado');

        // Carrega dados salvos
        window.onload = () => {
            const saved = localStorage.getItem('filmesData');
            if (saved) textarea.value = saved;
        };

        // Salva enquanto digita
        textarea.addEventListener('input', () => {
            localStorage.setItem('filmesData', textarea.value);
        });

        function sortear() {
            const lista = textarea.value.split('\n').filter(f => f.trim() !== "");
            
            if (lista.length === 0) {
                display.innerText = "Sua lista está vazia! 🎥";
                return;
            }

            display.classList.remove('pop-animation');
            void display.offsetWidth; // Reset de animação

            const escolhido = lista[Math.floor(Math.random() * lista.length)];
            display.innerHTML = `<span style="font-size: 0.8rem; display: block; color: #888;">FILME SORTEADO:</span> ${escolhido}`;
            display.classList.add('pop-animation');
        }

        function limpar() {
            if(confirm("Deseja apagar sua lista?")) {
                textarea.value = "";
                localStorage.removeItem('filmesData');
                display.innerText = "Dê o play!";
            }
        }
    </script>
</body>
</html>
